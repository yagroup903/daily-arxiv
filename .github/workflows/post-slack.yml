name: Post to Slack

on:
  push:
    branches:
      - main

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if result.md changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^output/result.md$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Slack
        if: steps.check.outputs.changed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(python3 << 'PYEOF'
          import json, re, pathlib

          text = pathlib.Path("output/result.md").read_text().strip()
          # Split into paper entries (separated by blank lines)
          entries = [e.strip() for e in re.split(r'\n\n+', text) if e.strip()]

          list_items = []
          for entry in entries:
              lines = entry.split('\n')
              elements = []
              for i, line in enumerate(lines):
                  # First line: "- *Title*" -> bold title
                  if i == 0:
                      title = re.sub(r'^-\s*\*?(.*?)\*?$', r'\1', line)
                      elements.append({"type": "text", "text": title, "style": {"bold": True}})
                  elif line.startswith("http"):
                      elements.append({"type": "text", "text": "\n"})
                      elements.append({"type": "link", "url": line.strip()})
                  else:
                      elements.append({"type": "text", "text": "\n" + line})
              list_items.append({"type": "rich_text_section", "elements": elements})

          payload = {
              "blocks": [{
                  "type": "rich_text",
                  "elements": [{
                      "type": "rich_text_list",
                      "style": "bullet",
                      "elements": list_items
                  }]
              }]
          }
          print(json.dumps(payload))
          PYEOF
          )
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            --fail --silent --show-error
