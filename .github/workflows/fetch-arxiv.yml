name: Fetch arXiv papers

on:
  schedule:
    # 00:50 UTC = 09:50 JST (every day; weekend skipping is handled by the script)
    - cron: "50 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch papers from arXiv
        run: python fetch_arxiv.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data/latest.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
